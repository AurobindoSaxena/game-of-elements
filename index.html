
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game of Elements</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.1/socket.io.min.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-96 text-center">
    <h1 class="text-xl font-bold mb-2">Game of Elements</h1>
    <p class="mb-4">(Envisioned by Aurobindo Saxena)</p>

    <div id="setup-screen">
      <input id="player-name" class="border p-2 mb-2 w-full" placeholder="Your Name">
      <select id="num-players" class="border p-2 mb-2 w-full">
        <option value="">Number of Players</option>
        <option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
      <button id="create-game" class="bg-blue-500 text-white py-2 px-4 rounded w-full">Create Game</button>

      <input id="game-id" class="border p-2 my-2 w-full" placeholder="Enter Game ID">
      <button id="join-game" class="bg-green-500 text-white py-2 px-4 rounded w-full">Join Game</button>
    </div>

    <div id="game-screen" class="hidden">
      <h2 class="text-lg font-semibold" id="game-info"></h2>
      <select id="element-select" class="border p-2 my-4 w-full">
        <option value="">Select Element</option>
        <option>Fire</option><option>Water</option><option>Earth</option><option>Air</option><option>Ether</option>
      </select>
      <button id="submit-choice" class="bg-purple-500 text-white py-2 px-4 rounded w-full">Submit Choice</button>
      <p id="waiting-message" class="mt-2"></p>
    </div>

    <div id="result-screen" class="hidden">
      <p id="result-message"></p>
      <button id="next-round" class="bg-green-500 text-white py-2 px-4 rounded w-full mt-4">Next Round</button>
    </div>
  </div>
  <script>
    const socket = io();
    document.getElementById('create-game').onclick = () => {
      const playerName = document.getElementById('player-name').value;
      const numPlayers = document.getElementById('num-players').value;
      socket.emit('createGame', { playerName, numPlayers });
    };
  </script>
</body>
</html>
